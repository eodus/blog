{% extends "base.html" %}
{% block title %}{{ section.title }}{% endblock %}
{% block content %}
<h1>{{ section.title }}</h1>
{% for page in section.pages %}
<article>
  <h2><a href="{{ page.permalink }}">{{ page.title }}</a></h2>
  <span class="post-date">{{ page.date }}</span>
  {% if page.summary %}<p>{{ page.summary | safe }}</p>{% endif %}
</article>
{% endfor %}
{% endblock %}
